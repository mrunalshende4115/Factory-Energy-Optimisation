name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest || true

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=mrunalshende4115_Factory-Energy-Optimisation
          -Dsonar.organization=mrunalshende4115
          -Dsonar.python.version=3.10
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Deploy to EC2
      run: |
        echo "$EC2_SSH_KEY" > key.pem
        chmod 600 key.pem
        ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@98.84.28.20 "
          cd /home/ec2-user/dashboard &&
          git pull
        "
      env:
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}